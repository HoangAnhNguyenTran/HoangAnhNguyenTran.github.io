<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">First Cloud AI Journey Banner</title>
  <desc id="desc">AWS themed banner for internship report site</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9900" />
      <stop offset="100%" stop-color="#ffb84d" />
    </linearGradient>
  </defs>
  <rect width="1400" height="420" fill="url(#bg)" rx="18" ry="18" />
  <circle cx="1210" cy="100" r="140" fill="#111827" opacity="0.35" />
  <circle cx="1170" cy="320" r="200" fill="#0b1220" opacity="0.35" />
  <rect x="60" y="88" width="230" height="12" fill="url(#accent)" rx="6" />
  <text x="60" y="165" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700">First Cloud AI Journey</text>
  <text x="60" y="222" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">Online Internship Report</text>
  <text x="60" y="270" fill="#f3f4f6" font-family="Segoe UI, Arial, sans-serif" font-size="26">Amazon Web Services Viet Nam Company Limited</text>
  <text x="60" y="316" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="24">Program: FCAJ | Mentor: Nguyen Gia Hung | Lecturer: Nguyen Hoang Nam</text>
  <path d="M1040 250c55 42 144 42 205 0" fill="none" stroke="#ff9900" stroke-width="12" stroke-linecap="round" />
  <text x="1070" y="220" fill="#ffb84d" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">aws</text>
